name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
    - run: npm ci --legacy-peer-deps
    - run: npm run test
      env:
        DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
        JWT_SECRET_KEY: "dummy-secret"
